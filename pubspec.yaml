name: jiltone_store_app
description: "Jiltone Store - Premium Fashion Shopping App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.2.0+3
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  go_router: ^14.0.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
